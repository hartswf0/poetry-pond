<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="color-scheme" content="dark">
<title>RCC ECO TOOL — Pond</title>
<style>
:root{
  --ink:#e9fbff;
  --muted:#8ab2bf;
  --water:#036d8b;
  --deep:#03131b;
  --cyan:#23f4f3;
  --gold:#ffe05b;
  --panel:#04151d;
  --panel2:#08232d;
  --danger:#ff7a72;
  --rail:52px;
  --composer:54px;
  --sheet:350px;
  --mono:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
  --sans:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
}
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:var(--deep);color:var(--ink);font-family:var(--sans)}
button,input,select,textarea{font:inherit;color:inherit}
button{cursor:pointer}
button:focus-visible,input:focus-visible,select:focus-visible,textarea:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
.hidden{display:none!important}

#world{position:fixed;inset:0;overflow:hidden;background:var(--deep);transition:right .3s cubic-bezier(.2,.8,.2,1)}
body.sheet-open #world{right:var(--sheet)}
#pond{position:absolute;inset:0;width:100%;height:100%;touch-action:none;cursor:grab}
#pond.dragging{cursor:grabbing}

/* chat is a trace, not a panel */
#chat{
  position:absolute;left:22px;bottom:108px;z-index:22;width:min(560px,calc(100vw - 120px));
  pointer-events:auto;padding:60px 12px 6px;
  background:linear-gradient(to bottom,transparent 0%,rgba(2,18,25,.18) 30%,rgba(2,18,25,.78) 100%);
}
#chat-lines{display:flex;flex-direction:column;gap:8px;align-items:flex-start}
.chat-line{max-width:100%;font-size:13px;line-height:1.5;text-shadow:0 1px 8px rgba(0,0,0,.9);opacity:.82;animation:line-in .8s ease both;cursor:pointer;overflow-wrap:anywhere}
.chat-line.user{font-weight:650;color:#fff}
.chat-line.assistant{color:#c9f7ff;font-family:Georgia,"Times New Roman",serif;font-size:16px;font-style:italic;letter-spacing:.005em}
.chat-line.system{font:10px/1.4 var(--mono);color:var(--muted);letter-spacing:.08em;text-transform:uppercase}
.chat-line.selected{opacity:1;color:#fff}
@keyframes line-in{from{opacity:0;transform:translateY(7px)}to{opacity:.82;transform:none}}

/* one quiet memory line */
#timeline{position:absolute;left:22px;right:78px;bottom:76px;height:20px;z-index:26}
#timeline-line{position:absolute;left:0;right:0;top:10px;height:1px;background:linear-gradient(90deg,rgba(255,255,255,.08),rgba(184,246,255,.55),rgba(255,255,255,.08))}
#timeline-marks{position:absolute;inset:0}
.tmark{position:absolute;top:6px;width:8px;height:8px;border:1px solid rgba(221,251,255,.75);background:var(--deep);border-radius:50%;transform:translateX(-50%);padding:0;transition:transform .2s,background .2s}
.tmark.user{border-color:#fff}
.tmark.assistant{border-color:var(--cyan)}
.tmark.branch{width:5px;height:5px;top:8px;border-color:var(--gold)}
.tmark.active{background:#fff;transform:translateX(-50%) scale(1.55);box-shadow:0 0 18px rgba(195,250,255,.65)}
#playhead{position:absolute;top:2px;width:1px;height:17px;background:#fff;box-shadow:0 0 10px rgba(255,255,255,.7);pointer-events:none;opacity:0;transform:translateX(-50%)}
#timeline.replay #playhead{opacity:1}

/* composer: one sentence, one action */
#composer{
  position:absolute;left:22px;right:78px;bottom:14px;height:var(--composer);z-index:30;display:flex;align-items:center;
  border:1px solid rgba(149,237,250,.48);background:linear-gradient(90deg,rgba(2,16,23,.92),rgba(2,16,23,.72));
  box-shadow:0 16px 46px rgba(0,0,0,.25)
}
#mic{width:52px;height:100%;border:0;border-right:1px solid rgba(149,237,250,.32);background:transparent;color:var(--muted);font-size:18px}
#mic:hover,#mic.listening{color:var(--cyan);background:rgba(35,244,243,.06)}
#message{flex:1;min-width:0;height:100%;border:0;background:transparent;outline:none;padding:0 16px;color:#fff;font-size:15px}
#message::placeholder{color:rgba(196,230,237,.55)}
#drop{height:100%;min-width:92px;border:0;border-left:1px solid rgba(149,237,250,.32);background:transparent;color:var(--cyan);font:800 10px var(--mono);letter-spacing:.15em;text-transform:uppercase}
#drop:hover{background:var(--cyan);color:#03202a}
#drop:disabled{opacity:.35;cursor:wait}

/* the entire interface lives in one thin rail */
#rail{position:fixed;right:14px;top:50%;z-index:90;transform:translateY(-50%);display:flex;flex-direction:column;gap:8px;transition:right .3s cubic-bezier(.2,.8,.2,1)}
body.sheet-open #rail{right:calc(var(--sheet) + 14px)}
.rail-btn{position:relative;width:var(--rail);height:var(--rail);border:1px solid rgba(35,244,243,.72);background:rgba(2,18,25,.86);color:var(--cyan);display:grid;place-items:center;font:800 13px var(--mono);letter-spacing:.04em}
.rail-btn:hover,.rail-btn.active{background:var(--cyan);color:#02171f;box-shadow:0 0 22px rgba(35,244,243,.2)}
.rail-btn.gold{border-color:rgba(255,224,91,.8);color:var(--gold)}
.rail-btn.gold:hover,.rail-btn.gold.active{background:var(--gold);color:#1a1600}
.rail-btn::before{content:attr(data-label);position:absolute;right:calc(100% + 9px);top:50%;transform:translateY(-50%) translateX(5px);padding:6px 8px;background:#031820;color:#dffbff;border:1px solid rgba(130,224,237,.45);font:800 9px var(--mono);letter-spacing:.1em;text-transform:uppercase;white-space:nowrap;opacity:0;pointer-events:none;transition:.18s}
.rail-btn:hover::before,.rail-btn:focus-visible::before{opacity:1;transform:translateY(-50%) translateX(0)}
.rail-btn .dot{position:absolute;right:5px;top:5px;width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.25)}
.rail-btn .dot.live{background:var(--cyan);box-shadow:0 0 8px var(--cyan)}
.rail-btn .dot.on{background:var(--gold);box-shadow:0 0 8px var(--gold)}

/* side sheets push the pond; they do not cover it */
#sheet{position:fixed;right:0;top:0;bottom:0;width:var(--sheet);z-index:100;background:linear-gradient(180deg,#061b24,#031219);border-left:1px solid rgba(149,237,250,.4);transform:translateX(100%);transition:transform .3s cubic-bezier(.2,.8,.2,1);display:grid;grid-template-rows:56px minmax(0,1fr)}
body.sheet-open #sheet{transform:none}
#sheet-head{display:flex;align-items:center;padding:0 15px;border-bottom:1px solid rgba(149,237,250,.24)}
#sheet-icon{width:32px;color:var(--cyan);font:900 14px var(--mono)}
#sheet-name{font:800 10px var(--mono);letter-spacing:.16em;text-transform:uppercase;color:#dffcff}
#sheet-close{margin-left:auto;width:34px;height:34px;border:1px solid rgba(149,237,250,.36);background:transparent;color:#fff;font-size:20px;line-height:1}
#sheet-close:hover{border-color:var(--cyan);color:var(--cyan)}
#sheet-body{overflow:auto;padding:18px}
.sheet-copy{font-size:13px;line-height:1.6;color:#b6d8df;margin:0 0 18px}
.sheet-block{padding:14px 0;border-top:1px solid rgba(149,237,250,.19)}
.sheet-block:first-child{border-top:0;padding-top:0}
.sheet-block label{display:block;margin:0 0 7px;font:800 9px var(--mono);letter-spacing:.1em;text-transform:uppercase;color:#90bdc8}
.sheet-block input,.sheet-block select,.sheet-block textarea{width:100%;border:1px solid rgba(149,237,250,.35);background:#04151d;padding:10px 11px;color:#effdff;outline:none}
.sheet-block textarea{min-height:92px;resize:vertical}
.row{display:flex;gap:8px;align-items:center}
.row>*{min-width:0}
.row .grow{flex:1}
.action{min-height:38px;border:1px solid rgba(149,237,250,.48);background:transparent;color:#dffbff;padding:0 12px;font:800 9px var(--mono);letter-spacing:.08em;text-transform:uppercase}
.action:hover,.action.active{background:var(--cyan);border-color:var(--cyan);color:#02202a}
.action.gold{border-color:rgba(255,224,91,.58);color:var(--gold)}
.action.gold:hover,.action.gold.active{background:var(--gold);border-color:var(--gold);color:#171300}
.action.danger{border-color:rgba(255,122,114,.5);color:var(--danger)}
.action.danger:hover{background:var(--danger);color:#210302}
.status{margin-top:9px;min-height:16px;font:10px/1.45 var(--mono);color:#85b2bd}
.pill{display:inline-flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid rgba(149,237,250,.28);font:800 9px var(--mono);letter-spacing:.06em;text-transform:uppercase;color:#bfe5ed}
.pill i{display:block;width:7px;height:7px;border-radius:50%;background:#607f87}
.pill i.live{background:var(--cyan);box-shadow:0 0 9px var(--cyan)}

/* memory */
#history-list{display:flex;flex-direction:column;gap:2px}
.memory{width:100%;border:0;border-left:1px solid rgba(149,237,250,.28);background:transparent;color:#b8d6dc;text-align:left;padding:9px 10px;display:grid;grid-template-columns:48px minmax(0,1fr);gap:9px}
.memory:hover,.memory.active{background:rgba(35,244,243,.07);border-left-color:var(--cyan);color:#fff}
.memory-time{font:8px/1.5 var(--mono);color:#7199a3}
.memory-text{font-size:12px;line-height:1.4;overflow-wrap:anywhere}
.memory-text em{display:block;margin-top:3px;color:#6f9aa4;font:8px var(--mono);letter-spacing:.08em;text-transform:uppercase}

/* range controls */
input[type="range"]{appearance:none;height:2px;background:rgba(151,232,244,.35);padding:0;border:0}
input[type="range"]::-webkit-slider-thumb{appearance:none;width:15px;height:15px;border-radius:50%;background:var(--cyan);border:0}
.toggle-line{display:flex;justify-content:space-between;align-items:center;gap:10px;margin:10px 0;color:#c6e6ec;font-size:12px}
.switch{width:44px;height:24px;border:1px solid rgba(149,237,250,.4);background:#031219;padding:2px;display:flex;align-items:center}
.switch::after{content:"";width:18px;height:18px;background:#5f7f87;transition:.2s}
.switch.on::after{transform:translateX(18px);background:var(--cyan);box-shadow:0 0 10px rgba(35,244,243,.45)}

#replay-state{position:absolute;left:22px;top:18px;z-index:25;padding:7px 9px;border:1px solid rgba(255,224,91,.45);background:rgba(2,18,25,.78);color:var(--gold);font:800 9px var(--mono);letter-spacing:.12em;text-transform:uppercase;display:none}
#replay-state.show{display:block}


/* the generated line is the primary artifact */
#reader{
  position:absolute;z-index:38;width:min(560px,calc(100vw - 150px));max-height:min(48vh,430px);
  padding:18px 44px 18px 20px;border:1px solid rgba(189,246,255,.42);
  background:linear-gradient(135deg,rgba(2,16,23,.94),rgba(4,31,41,.88));
  box-shadow:0 20px 70px rgba(0,0,0,.28);overflow:auto;pointer-events:auto;
  transition:opacity .24s ease,transform .24s ease;scrollbar-width:thin;scrollbar-color:rgba(173,238,247,.35) transparent
}
#reader.hidden{display:block!important;opacity:0;pointer-events:none;transform:translateY(8px)}
#reader-lines{display:flex;flex-direction:column;gap:12px}
.reader-line{font:400 clamp(17px,1.55vw,25px)/1.45 Georgia,"Times New Roman",serif;color:#d8f7fb;overflow-wrap:anywhere;white-space:pre-wrap}
.reader-line.user{font-family:var(--sans);font-size:clamp(13px,1vw,16px);font-weight:650;color:#fff}
.reader-line.latest{color:#fff}
.reader-line+.reader-line{padding-top:12px;border-top:1px solid rgba(174,236,245,.16)}
#reader-close,#reader-speak{position:absolute;top:8px;width:28px;height:28px;border:0;background:transparent;color:rgba(222,250,255,.72);font-size:17px}
#reader-close{right:7px}#reader-speak{right:34px;font-size:13px}
#reader-close:hover,#reader-speak:hover{color:var(--cyan)}
#reader-tail{position:absolute;width:26px;height:1px;background:rgba(199,246,251,.45);transform-origin:0 50%;pointer-events:none}

/* context is summoned at the stone, never permanently docked */
#context-menu{position:fixed;z-index:150;display:none;grid-template-columns:repeat(2,minmax(84px,1fr));gap:1px;width:220px;padding:1px;background:rgba(122,218,232,.42);box-shadow:0 16px 55px rgba(0,0,0,.45)}
#context-menu.show{display:grid}
#context-menu button{min-height:36px;border:0;background:#041821;color:#dffaff;padding:7px 9px;text-align:left;font:800 9px var(--mono);letter-spacing:.07em;text-transform:uppercase}
#context-menu button:hover,#context-menu button:focus-visible{background:var(--cyan);color:#031820}
#context-menu button.wide{grid-column:1/-1}
#context-menu button.gold{color:var(--gold)}
#context-menu button.gold:hover{background:var(--gold);color:#1b1500}

/* one action removes the interface for recital and projection */
#present-exit{position:fixed;right:12px;top:12px;z-index:170;width:38px;height:38px;border:1px solid rgba(210,249,255,.5);border-radius:50%;background:rgba(2,16,23,.42);color:#fff;font-size:20px;display:none;opacity:.42}
#present-exit:hover{opacity:1;background:rgba(2,16,23,.9)}
body.presenting #rail,body.presenting #composer{opacity:0;pointer-events:none;transform:translateY(-50%) translateX(80px)}
body.presenting #composer{transform:translateY(25px)}
body.presenting #present-exit{display:block}
body.presenting #chat{bottom:60px;width:min(680px,calc(100vw - 80px));background:linear-gradient(to bottom,transparent,rgba(2,18,25,.66));padding-top:34px}
body.presenting #timeline{bottom:28px;right:22px}
body.presenting.field-only #chat,body.presenting.field-only #timeline{opacity:0;pointer-events:none}
body.presenting #reader{width:min(760px,calc(100vw - 80px));max-height:58vh;padding:24px 54px 24px 26px;background:linear-gradient(135deg,rgba(2,16,23,.9),rgba(4,31,41,.78))}
body.presenting .reader-line{font-size:clamp(22px,2.3vw,38px);line-height:1.4}
body.presenting .reader-line.user{font-size:clamp(14px,1.2vw,18px)}

body.ui-hidden:not(.presenting) #rail{opacity:0;pointer-events:none;transform:translateY(-50%) translateX(80px)}
body.ui-hidden:not(.presenting) #composer{opacity:0;pointer-events:none;transform:translateY(25px)}

@media(max-width:760px){
  #reader{width:calc(100vw - 82px);max-height:42vh;padding:15px 40px 15px 15px}
  .reader-line{font-size:18px}
  #context-menu{width:min(230px,calc(100vw - 24px))}
  body.presenting #reader{width:calc(100vw - 28px);max-height:52vh}
}

#file-input{display:none}

@media(max-width:760px){
  :root{--sheet:min(92vw,350px);--rail:46px;--composer:52px}
  body.sheet-open #world{right:0}
  body.sheet-open #rail{right:14px;opacity:0;pointer-events:none}
  #sheet{width:100%;max-width:var(--sheet)}
  #rail{right:8px;gap:6px}
  #composer{left:10px;right:62px;bottom:10px}
  #timeline{left:10px;right:62px;bottom:70px}
  #chat{left:10px;bottom:99px;width:calc(100vw - 82px);padding-left:5px}
  #mic{width:44px}
  #drop{min-width:74px}
  .chat-line{font-size:12px}
  .chat-line.assistant{font-size:15px}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>
<body>
<div id="world">
  <canvas id="pond" aria-label="Interactive pond field"></canvas>
  <div id="replay-state">memory</div>
  <div id="reader" class="hidden" aria-live="polite">
    <button id="reader-speak" type="button" aria-label="Speak selected poem">◉</button>
    <button id="reader-close" type="button" aria-label="Close poem">×</button>
    <div id="reader-lines"></div>
  </div>
  <div id="reader-tail" class="hidden"></div>
  <div id="chat" aria-live="polite"><div id="chat-lines"></div></div>
  <div id="timeline" aria-label="Timeline">
    <div id="timeline-line"></div><div id="timeline-marks"></div><div id="playhead"></div>
  </div>
  <form id="composer" autocomplete="off">
    <button id="mic" type="button" aria-label="Speak a message" title="Speak">◉</button>
    <input id="message" type="text" maxlength="600" placeholder="Drop a thought into the water…" aria-label="Message">
    <button id="drop" type="submit">Drop</button>
  </form>
</div>

<nav id="rail" aria-label="Tools">
  <button class="rail-btn" data-panel="voice" data-label="Voice" aria-label="Voice">V<span id="voice-dot" class="dot"></span></button>
  <button class="rail-btn gold" data-panel="api" data-label="AI" aria-label="AI">AI<span id="api-dot" class="dot"></span></button>
  <button class="rail-btn" data-panel="history" data-label="Memory" aria-label="Memory">H</button>
  <button class="rail-btn" data-panel="replay" data-label="Replay" aria-label="Replay">↺</button>
  <button class="rail-btn" data-panel="record" data-label="Record" aria-label="Record">●<span id="rec-dot" class="dot"></span></button>
  <button class="rail-btn" data-panel="file" data-label="File" aria-label="File">F</button>
  <button class="rail-btn gold" data-panel="world" data-label="World" aria-label="World">W</button>
  <button class="rail-btn gold" data-action="present" data-label="Present" aria-label="Presentation mode">P</button>
  <button class="rail-btn" data-panel="system" data-label="System" aria-label="System">S</button>
</nav>
<button id="present-exit" type="button" aria-label="Exit presentation">×</button>
<div id="context-menu" role="menu" aria-label="Stone actions">
  <button data-action="read">Read</button><button data-action="speak">Speak</button>
  <button data-action="continue" class="gold">Continue</button><button data-action="present">Present</button>
  <button data-action="branch">Branch from</button><button data-action="connect">Connect here</button>
  <button data-action="neutral">Neutral</button><button data-action="obstacle">Obstacle</button>
  <button data-action="goal">Goal</button><button data-action="shift">Shift</button>
  <button data-action="center">Center</button><button data-action="replay">Replay here</button>
</div>

<aside id="sheet" aria-hidden="true">
  <div id="sheet-head"><span id="sheet-icon">V</span><span id="sheet-name">Voice</span><button id="sheet-close" aria-label="Close">×</button></div>
  <div id="sheet-body"></div>
</aside>
<input id="file-input" type="file" accept="application/json,.json">

<script>
(() => {
'use strict';

const $ = (s,root=document)=>root.querySelector(s);
const $$ = (s,root=document)=>[...root.querySelectorAll(s)];
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const lerp=(a,b,t)=>a+(b-a)*t;
const ease=t=>1-Math.pow(1-clamp(t,0,1),3);
const nowISO=()=>new Date().toISOString();
const uid=(p='E')=>p+'-'+Date.now().toString(36).toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase();
const hash=s=>{let h=2166136261;for(let i=0;i<s.length;i++){h^=s.charCodeAt(i);h=Math.imul(h,16777619)}return h>>>0};
const seeded=n=>{n=(n^61)^(n>>>16);n=n+ (n<<3);n=n^(n>>>4);n=Math.imul(n,0x27d4eb2d);n=n^(n>>>15);return (n>>>0)/4294967295};

const els={
  world:$('#world'),canvas:$('#pond'),chat:$('#chat-lines'),timeline:$('#timeline'),marks:$('#timeline-marks'),playhead:$('#playhead'),
  composer:$('#composer'),message:$('#message'),drop:$('#drop'),mic:$('#mic'),rail:$('#rail'),sheet:$('#sheet'),sheetIcon:$('#sheet-icon'),
  sheetName:$('#sheet-name'),sheetBody:$('#sheet-body'),sheetClose:$('#sheet-close'),fileInput:$('#file-input'),replayState:$('#replay-state'),
  voiceDot:$('#voice-dot'),apiDot:$('#api-dot'),recDot:$('#rec-dot'),reader:$('#reader'),readerLines:$('#reader-lines'),readerClose:$('#reader-close'),readerSpeak:$('#reader-speak'),readerTail:$('#reader-tail'),contextMenu:$('#context-menu'),presentExit:$('#present-exit')
};
const ctx=els.canvas.getContext('2d');

const DEFAULT_SETTINGS={
  theme:'dusk',motion:0.72,rippleStrength:0.8,showLinks:true,showLabels:true,ambient:false,ambientVolume:0.18,
  voiceEnabled:false,voiceMode:'responses',voiceName:'',voiceRate:0.88,voicePitch:0.92,voiceVolume:0.9,
  apiKey:'',model:'gpt-5.6-luna',apiEnabled:false,autoEnabled:false,autoDepth:4,autoDelay:2600,presentationView:'words'
};

const APP={
  version:4,events:[],liveCursor:-1,cursor:-1,replay:false,selectedNode:'',busy:false,
  settings:{...DEFAULT_SETTINGS},view:{panX:0,panY:0,zoom:1},sheet:'',presentation:false,uiHidden:false,
  drops:[],ripples:[],splashes:[],floaters:[],hoverNode:'',pointer:{x:0,y:0,down:false,lastX:0,lastY:0,moved:false},
  rec:null,recStream:null,recChunks:[],replayTimer:null,audio:null,noise:null,lastFrame:performance.now(),fileStatus:'',clearArmed:false,
  contextNode:'',branchSource:'',longPressTimer:null,longPressStart:null,autoToken:0,saveTimer:null
};

function save(){
  clearTimeout(APP.saveTimer);
  APP.saveTimer=setTimeout(()=>{
    try{localStorage.setItem('rcc.pond.session',JSON.stringify({version:APP.version,events:APP.events,settings:APP.settings,view:APP.view}))}catch{}
  },120);
}
function load(){
  try{
    const raw=JSON.parse(localStorage.getItem('rcc.pond.session')||'null');
    if(raw&&Array.isArray(raw.events)){APP.events=raw.events;APP.settings={...DEFAULT_SETTINGS,...raw.settings};APP.view={...APP.view,...raw.view}}
  }catch{}
  APP.liveCursor=APP.events.length-1;APP.cursor=APP.liveCursor;
}

function addEvent(type,text,data={}){
  const ev={id:uid('E'),type,text:String(text||''),time:nowISO(),...data};
  APP.events.push(ev);APP.liveCursor=APP.events.length-1;APP.cursor=APP.liveCursor;APP.replay=false;
  save();renderUI();return ev;
}

function worldPosition(text,index=0,near=null){
  const h=hash(text+'|'+index);
  if(near){
    const a=seeded(h)*Math.PI*2,d=.08+seeded(h+12)*.13;
    return {x:clamp(near.x+Math.cos(a)*d,-.87,.87),z:clamp(near.z+Math.sin(a)*d,.12,.94)};
  }
  return {x:-.78+seeded(h)*1.56,z:.18+seeded(h+99)*.7};
}

function stateAt(cursor=APP.cursor){
  const nodes=new Map(),branches=[];
  const upto=cursor<0?[]:APP.events.slice(0,cursor+1);
  for(const ev of upto){
    if(ev.type==='user'||ev.type==='assistant'){
      let n=nodes.get(ev.nodeId);
      if(!n){n={id:ev.nodeId,x:ev.x,z:ev.z,kind:ev.type,layers:[],created:ev.id};nodes.set(ev.nodeId,n)}
      n.layers.push({eventId:ev.id,text:ev.text,type:ev.type,time:ev.time});n.kind=ev.type;
    } else if(ev.type==='branch') branches.push(ev);
    else if(ev.type==='classify'){const n=nodes.get(ev.nodeId);if(n)n.classification=ev.classification}
  }
  return {nodes:[...nodes.values()],branches,events:upto};
}

function recentContext(){
  return APP.events.filter(e=>e.type==='user'||e.type==='assistant').slice(-8).map(e=>`${e.type==='user'?'Person':'Pond'}: ${e.text}`).join('\n');
}

function localResponse(text){
  const clean=text.trim().replace(/\s+/g,' ');
  const key=hash(clean);const stop=new Set(['this','that','with','from','into','over','under','every','their','there','where','when','what','have','will','would','could','should','drew','drawn','makes','made','remembers','remember']);const words=clean.toLowerCase().replace(/[^a-z0-9\s-]/g,' ').split(/\s+/).filter(w=>w.length>3&&!stop.has(w));const focus=words[key%Math.max(1,words.length)]||'water';
  const templates=[
    `Across the water, ${focus} loosens its shadow and leaves one clear condition behind.`,
    `The pond carries ${focus} outward until a quieter action becomes visible at the edge.`,
    `${focus} enters as a stone and returns as a path the shore did not hold before.`,
    `A second ring opens around ${focus}; something nearby must move, wait, or answer.`,
    `The surface keeps ${focus} intact, then gives its consequence back in a different light.`,
    `Beneath ${focus}, the next observable change gathers slowly and touches another shore.`
  ];
  return {response:templates[key%templates.length],branch:key%2===0};
}

async function apiResponse(text){
  if(!APP.settings.apiEnabled||!APP.settings.apiKey) return localResponse(text);
  const controller=new AbortController();const timer=setTimeout(()=>controller.abort(),30000);
  const prompt=`You are the quiet poet of an operational pond. A literal message has been dropped into water. Return JSON only with two fields: "response" (one complete, highly legible poetic line of 10-28 words; concrete image, motion, or changed condition; no title, no explanation, no quotation marks) and "branch" (boolean, true when this line should become a neighboring stone rather than another layer on the same stone). Preserve contact with the literal message while making the consequence beautiful to hear aloud. Message: ${JSON.stringify(text)}\nRecent poem:\n${recentContext()}`;
  try{
    const r=await fetch('https://api.openai.com/v1/responses',{
      method:'POST',signal:controller.signal,headers:{'Content-Type':'application/json','Authorization':'Bearer '+APP.settings.apiKey},
      body:JSON.stringify({model:APP.settings.model,input:[{role:'developer',content:'Return valid JSON only. Write one calm, concrete poetic line that remains readable and complete.'},{role:'user',content:prompt}],max_output_tokens:220})
    });
    const data=await r.json();
    if(!r.ok) throw new Error(data?.error?.message||`API ${r.status}`);
    const out=extractText(data).trim().replace(/^```json\s*|```$/g,'').trim();
    const parsed=JSON.parse(out);
    if(!parsed.response) throw new Error('No response text');
    return {response:String(parsed.response).trim(),branch:Boolean(parsed.branch)};
  } finally {clearTimeout(timer)}
}
function extractText(data){
  if(typeof data?.output_text==='string') return data.output_text;
  const out=[];for(const item of data?.output||[])for(const c of item?.content||[])if(c?.type==='output_text'&&c.text)out.push(c.text);
  return out.join('\n');
}

async function generateFrom(sourceEv,{forceBranch=false}={}){
  const sourcePos={x:sourceEv.x,z:sourceEv.z};let result;
  try{result=await apiResponse(sourceEv.text)}catch{result=localResponse(sourceEv.text)}
  const branch=forceBranch||result.branch;const responsePos=branch?worldPosition(result.response,APP.events.length,sourcePos):sourcePos;
  const responseNode=branch?uid('N'):sourceEv.nodeId;
  const ae=addEvent('assistant',result.response,{nodeId:responseNode,x:responsePos.x,z:responsePos.z,sourceNode:sourceEv.nodeId,sourceEvent:sourceEv.id,via:APP.settings.apiEnabled&&APP.settings.apiKey?'api':'local'});
  animateDrop(ae,.72);if(branch)addEvent('branch','',{from:sourceEv.nodeId,to:responseNode,sourceEvent:sourceEv.id,targetEvent:ae.id});
  APP.selectedNode=responseNode;speak(result.response,'assistant');renderUI();return ae;
}

async function runAuto(seedEvent){
  const token=++APP.autoToken;let source=seedEvent;const depth=clamp(+APP.settings.autoDepth||4,1,12);
  for(let i=1;i<depth;i++){
    await wait(clamp(+APP.settings.autoDelay||2600,800,12000));
    if(token!==APP.autoToken||!APP.settings.autoEnabled||APP.replay)return;
    APP.busy=true;els.drop.disabled=true;
    try{source=await generateFrom(source,{forceBranch:true})}finally{APP.busy=false;els.drop.disabled=false}
  }
}

async function continueFromNode(nodeId){
  if(APP.busy)return;const source=[...APP.events].reverse().find(e=>(e.type==='user'||e.type==='assistant')&&e.nodeId===nodeId);if(!source)return;
  APP.autoToken++;APP.busy=true;els.drop.disabled=true;stopReplay();goLive();
  try{await wait(180);await generateFrom(source,{forceBranch:true})}finally{APP.busy=false;els.drop.disabled=false;els.message.focus()}
}

async function dropMessage(text){
  text=String(text||'').trim();if(!text||APP.busy)return;
  APP.autoToken++;APP.busy=true;els.drop.disabled=true;els.message.value='';stopReplay();goLive();
  const position=worldPosition(text,APP.events.length),nodeId=uid('N');
  const ev=addEvent('user',text,{nodeId,x:position.x,z:position.z});APP.selectedNode=nodeId;animateDrop(ev);speak(text,'user');renderUI();
  let ae=null;
  try{await wait(640);ae=await generateFrom(ev)}finally{APP.busy=false;els.drop.disabled=false;els.message.focus();renderUI()}
  if(ae&&APP.settings.autoEnabled)runAuto(ae);
}

function wait(ms){return new Promise(r=>setTimeout(r,ms))}

function animateDrop(ev,weight=1){
  APP.drops.push({id:ev.id,nodeId:ev.nodeId,x:ev.x,z:ev.z,start:performance.now(),duration:850,weight});
  const p=screenFromWorld(ev.x,ev.z);APP.splashes.push(...Array.from({length:16},(_,i)=>({x:p.x,y:p.y,vx:(Math.random()-.5)*2.8,vy:-1-Math.random()*2.8,life:1,start:performance.now()+i*8})));
  APP.ripples.push({x:ev.x,z:ev.z,start:performance.now()+550,duration:4400,strength:APP.settings.rippleStrength*weight,rings:4});
  APP.floaters.push({x:ev.x,z:ev.z,nodeId:ev.nodeId,text:ev.text,start:performance.now()+700,duration:5200});
}

function positionReader(){

  const s=screenFromWorld(node.x,node.z),rw=els.reader.offsetWidth||480,rh=els.reader.offsetHeight||150,m=16;
  let left=s.x+42,top=s.y-rh*.55;if(left+rw>W-76)left=s.x-rw-42;left=clamp(left,m,Math.max(m,W-rw-70));top=clamp(top,m,Math.max(m,H-rh-90));
  if(APP.presentation){left=clamp((W-rw)/2,m,W-rw-m);top=clamp(H-rh-(APP.settings.presentationView==='field'?24:96),m,H-rh-m)}

}

  speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(text);const voices=speechSynthesis.getVoices();
  const v=voices.find(v=>v.name===APP.settings.voiceName)||voices.find(v=>/samantha|daniel|serena|ava|google uk english/i.test(v.name))||voices[0];

function setAmbient(on){
  APP.settings.ambient=on;
  if(on){
    if(!APP.audio){
      const AC=window.AudioContext||window.webkitAudioContext;if(!AC)return;
      APP.audio=new AC();const len=APP.audio.sampleRate*2,b=APP.audio.createBuffer(1,len,APP.audio.sampleRate),d=b.getChannelData(0);let last=0;
      for(let i=0;i<len;i++){const white=Math.random()*2-1;last=last*.985+white*.015;d[i]=last*.45}
      const src=APP.audio.createBufferSource();src.buffer=b;src.loop=true;const filter=APP.audio.createBiquadFilter();filter.type='lowpass';filter.frequency.value=700;
      const gain=APP.audio.createGain();gain.gain.value=APP.settings.ambientVolume;src.connect(filter).connect(gain).connect(APP.audio.destination);src.start();APP.noise={src,gain};
    }else APP.audio.resume();
  }else if(APP.audio)APP.audio.suspend();save();updateDots();
}

  const b=block(`<label>Light</label><select id="world-theme"><option value="dusk" ${APP.settings.theme==='dusk'?'selected':''}>Dusk</option><option value="day" ${APP.settings.theme==='day'?'selected':''}>Day</option><option value="night" ${APP.settings.theme==='night'?'selected':''}>Night</option></select>
    <label style="margin-top:14px">Motion</label><input id="world-motion" type="range" min="0" max="1" step="0.01" value="${APP.settings.motion}">
    <label style="margin-top:14px">Ripples</label><input id="world-ripple" type="range" min="0.2" max="1.5" step="0.01" value="${APP.settings.rippleStrength}">
    <div class="toggle-line"><span>Currents</span><button id="world-links" class="switch ${APP.settings.showLinks?'on':''}"></button></div>
    <div class="toggle-line"><span>Stone marks</span><button id="world-labels" class="switch ${APP.settings.showLabels?'on':''}"></button></div>
    <label style="margin-top:14px">Presentation</label><select id="present-view"><option value="words" ${APP.settings.presentationView==='words'?'selected':''}>Field + words</option><option value="field" ${APP.settings.presentationView==='field'?'selected':''}>Field only</option></select>
    <div class="row" style="margin-top:12px"><button id="world-present" class="action gold grow">Present</button><button id="world-home" class="action grow">Shore</button></div>`);
  $('#world-theme',b).onchange=e=>{APP.settings.theme=e.target.value;save()};$('#world-motion',b).oninput=e=>{APP.settings.motion=+e.target.value;save()};$('#world-ripple',b).oninput=e=>{APP.settings.rippleStrength=+e.target.value;save()};
  $('#world-links',b).onclick=()=>{APP.settings.showLinks=!APP.settings.showLinks;save();renderSheet('world')};$('#world-labels',b).onclick=()=>{APP.settings.showLabels=!APP.settings.showLabels;save();renderSheet('world')};
  $('#present-view',b).onchange=e=>{APP.settings.presentationView=e.target.value;save()};$('#world-present',b).onclick=()=>setPresentation(true);
  $('#world-home',b).onclick=()=>{APP.view={panX:0,panY:0,zoom:1};save()};
}

function systemPanel(){
  const b=block(`<p class="sheet-copy">${APP.events.length} events are held in this pond.</p><div class="row"><button id="system-demo" class="action gold grow">Demo</button><button id="system-new" class="action danger grow">New pond</button></div><button id="system-close" class="action" style="width:100%;margin-top:8px">Close every surface</button>`);
  $('#system-demo',b).onclick=runDemo;$('#system-new',b).onclick=()=>{if(!APP.clearArmed){APP.clearArmed=true;$('#system-new',b).textContent='Again to clear';return}APP.autoToken++;stopReplay();window.speechSynthesis?.cancel?.();APP.events=[];APP.cursor=APP.liveCursor=-1;APP.selectedNode='';APP.drops=[];APP.ripples=[];APP.clearArmed=false;localStorage.removeItem('rcc.pond.session');renderUI();closeSheet()};
  $('#system-close',b).onclick=()=>{closeSheet();goLive()};
  block(`<p class="sheet-copy">Drag the water to move. Use the wheel or pinch to change distance. Touch a stone to bind it to the chat and memory line.</p>`);
}

function runDemo(){closeSheet();const lines=['A threshold is not a wall.','Attention changes the path it measures.','The quiet system still makes decisions.'];let i=0;const next=()=>{if(i>=lines.length)return;dropMessage(lines[i++]).then(()=>setTimeout(next,500))};next()}

/* canvas */
let W=0,H=0,DPR=1,horizon=0;
function resize(){const r=els.canvas.getBoundingClientRect();DPR=Math.min(2,window.devicePixelRatio||1);W=Math.max(1,r.width);H=Math.max(1,r.height);els.canvas.width=W*DPR;els.canvas.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);horizon=H*.29}
function screenFromWorld(x,z){
  const zoom=APP.view.zoom;const depth=Math.pow(clamp(z,0,1),.72);return {x:W*.5+(x*W*.48*zoom)+APP.view.panX,y:horizon+depth*(H-horizon-95)*zoom+APP.view.panY,scale:(.42+depth*.92)*zoom,depth};
}
function worldFromScreen(x,y){const zoom=APP.view.zoom;const depth=clamp((y-horizon-APP.view.panY)/((H-horizon-95)*zoom),0,1);const z=Math.pow(depth,1/.72);return{x:clamp((x-W*.5-APP.view.panX)/(W*.48*zoom),-.95,.95),z}}

function palette(){
  if(APP.settings.theme==='day')return{sky1:'#cceff5',sky2:'#6dc6d8',haze:'#b9edf3',water1:'#2c9eb9',water2:'#075b77',deep:'#02354a',line:'rgba(196,249,255,.28)',stone1:'#26353d',stone2:'#0d151a'};
  if(APP.settings.theme==='night')return{sky1:'#020710',sky2:'#081b2b',haze:'#124159',water1:'#052d40',water2:'#021822',deep:'#010b10',line:'rgba(94,217,237,.18)',stone1:'#1b242c',stone2:'#030609'};
  return{sky1:'#07151e',sky2:'#64bfd6',haze:'#8ee6eb',water1:'#087a99',water2:'#02506c',deep:'#021823',line:'rgba(109,229,244,.24)',stone1:'#394957',stone2:'#071018'};
}

function draw(t){
  const dt=Math.min(50,t-APP.lastFrame);APP.lastFrame=t;const p=palette();ctx.clearRect(0,0,W,H);
  drawSky(t,p);drawWater(t,p);drawBranches(t,p);drawNodes(t,p);drawRipples(t,p);drawDrops(t,p);drawSplashes(t,p);drawFloaters(t,p);positionReader();
  requestAnimationFrame(draw);
}
function drawSky(t,p){
  const g=ctx.createLinearGradient(0,0,0,horizon);g.addColorStop(0,p.sky1);g.addColorStop(.78,p.sky2);g.addColorStop(1,p.haze);ctx.fillStyle=g;ctx.fillRect(0,0,W,horizon+2);
  ctx.fillStyle='rgba(1,12,18,.75)';ctx.beginPath();ctx.moveTo(0,horizon+2);for(let x=0;x<=W;x+=20){const y=horizon-8-Math.sin(x*.013)*4-Math.sin(x*.041)*2;ctx.lineTo(x,y)}ctx.lineTo(W,horizon+4);ctx.closePath();ctx.fill();
}
function drawWater(t,p){
  const g=ctx.createLinearGradient(0,horizon,0,H);g.addColorStop(0,p.water1);g.addColorStop(.58,p.water2);g.addColorStop(1,p.deep);ctx.fillStyle=g;ctx.fillRect(0,horizon,W,H-horizon);
  const motion=APP.settings.motion;
  ctx.save();ctx.globalCompositeOperation='screen';
  for(let i=0;i<22;i++){
    const q=i/21;const y=horizon+Math.pow(q,1.65)*(H-horizon);const amp=1+q*4;ctx.beginPath();
    for(let x=-20;x<=W+20;x+=10){const yy=y+Math.sin(x*.018+t*.00018*(.35+i*.02))*amp*motion+Math.sin(x*.006-t*.0001)*amp*.35*motion;x===-20?ctx.moveTo(x,yy):ctx.lineTo(x,yy)}
    ctx.strokeStyle=p.line;ctx.lineWidth=.45+q*.65;ctx.stroke();
  }
  for(let i=0;i<9;i++){
    const base=(i/8)*W;ctx.beginPath();for(let q=0;q<=1;q+=.03){const y=horizon+q*(H-horizon);const spread=Math.pow(q,1.25);const x=W*.5+(base-W*.5)*spread+Math.sin(t*.00018+i)*10*q*motion;q===0?ctx.moveTo(x,y):ctx.lineTo(x,y)}ctx.strokeStyle='rgba(92,226,240,.08)';ctx.lineWidth=1;ctx.stroke();
  }
  ctx.restore();
  const shimmer=(Math.sin(t*.00045)+1)/2;const hg=ctx.createLinearGradient(0,horizon-2,0,horizon+24);hg.addColorStop(0,`rgba(197,252,255,${.18+shimmer*.08})`);hg.addColorStop(1,'rgba(197,252,255,0)');ctx.fillStyle=hg;ctx.fillRect(0,horizon-2,W,26);
}
function drawNodes(t,p){
  const state=stateAt();const nodes=[...state.nodes].sort((a,b)=>a.z-b.z);
  for(const n of nodes){const s=screenFromWorld(n.x,n.z);drawStone(n,s,t,p)}
}
function drawStone(n,s,t,p){
  const selected=n.id===APP.selectedNode,hover=n.id===APP.hoverNode,source=n.id===APP.branchSource;const layers=n.layers.length;const breathe=1+Math.sin(t*.0014+hash(n.id)%10)*.018*APP.settings.motion;
  const rx=(17+Math.min(12,layers*2.2))*s.scale*breathe,ry=rx*(.45+.04*Math.sin(hash(n.id)));
  ctx.save();ctx.translate(s.x,s.y);
  ctx.fillStyle='rgba(0,0,0,.22)';ctx.beginPath();ctx.ellipse(0,ry*.72,rx*1.16,ry*.48,0,0,Math.PI*2);ctx.fill();
  for(let i=3;i>=1;i--){ctx.strokeStyle=`rgba(191,249,255,${selected?.32/i:.09/i})`;ctx.lineWidth=selected?1.3:.6;ctx.beginPath();ctx.ellipse(0,ry*.55,rx*(1+i*.25),ry*(1+i*.22),0,0,Math.PI*2);ctx.stroke()}
  const g=ctx.createRadialGradient(-rx*.28,-ry*.5,2,0,0,rx*1.2);g.addColorStop(0,p.stone1);g.addColorStop(.7,p.stone2);g.addColorStop(1,'#010406');ctx.fillStyle=g;organicEllipse(ctx,rx,ry,hash(n.id));ctx.fill();
  const classColor={obstacle:'rgba(255,122,114,.9)',goal:'rgba(255,224,91,.92)',shift:'rgba(189,134,255,.92)',neutral:'rgba(192,232,239,.45)'}[n.classification||'neutral'];
  ctx.strokeStyle=selected?'#efffff':source?'rgba(255,224,91,.96)':hover?'rgba(215,254,255,.8)':classColor;ctx.lineWidth=selected||source?2:1;organicEllipse(ctx,rx,ry,hash(n.id));ctx.stroke();
  if(selected||source){ctx.strokeStyle=source?'rgba(255,224,91,.82)':'rgba(35,244,243,.75)';ctx.lineWidth=1;ctx.beginPath();ctx.ellipse(0,0,rx*1.45,ry*1.65,0,0,Math.PI*2);ctx.stroke()}
  if(APP.settings.showLabels&&(selected||hover||layers>1)){
    const mark=layers>1?String(layers):'·';ctx.font=`800 ${Math.max(9,10*s.scale)}px ${getComputedStyle(document.documentElement).getPropertyValue('--mono')}`;ctx.fillStyle='rgba(2,12,17,.78)';ctx.beginPath();ctx.arc(0,-ry-10*s.scale,9*s.scale,0,Math.PI*2);ctx.fill();ctx.fillStyle='#eaffff';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(mark,0,-ry-10*s.scale)
  }
  ctx.restore();
}
function organicEllipse(c,rx,ry,seed){
  const pts=36;c.beginPath();for(let i=0;i<=pts;i++){const a=i/pts*Math.PI*2;const n=1+(seeded(seed+i*71)-.5)*.09;const x=Math.cos(a)*rx*n,y=Math.sin(a)*ry*n;i?c.lineTo(x,y):c.moveTo(x,y)}c.closePath();
}
function roundRect(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.arcTo(x+w,y,x+w,y+h,r);c.arcTo(x+w,y+h,x,y+h,r);c.arcTo(x,y+h,x,y,r);c.arcTo(x,y,x+w,y,r);c.closePath()}

function drawBranches(t,p){if(!APP.settings.showLinks)return;const state=stateAt();const map=new Map(state.nodes.map(n=>[n.id,n]));ctx.save();
  for(const b of state.branches){const a=map.get(b.from),d=map.get(b.to);if(!a||!d)continue;const p1=screenFromWorld(a.x,a.z),p2=screenFromWorld(d.x,d.z);const mx=(p1.x+p2.x)/2,my=Math.min(p1.y,p2.y)-28-Math.abs(p1.x-p2.x)*.05;ctx.beginPath();ctx.moveTo(p1.x,p1.y);ctx.quadraticCurveTo(mx,my,p2.x,p2.y);ctx.setLineDash([2,8]);ctx.lineDashOffset=-t*.015;ctx.strokeStyle='rgba(255,224,91,.34)';ctx.lineWidth=1;ctx.stroke();
    const q=((t*.00016+seeded(hash(b.id)))%1);const xa=(1-q)*(1-q)*p1.x+2*(1-q)*q*mx+q*q*p2.x,ya=(1-q)*(1-q)*p1.y+2*(1-q)*q*my+q*q*p2.y;ctx.fillStyle='rgba(255,224,91,.7)';ctx.beginPath();ctx.arc(xa,ya,2.2,0,Math.PI*2);ctx.fill();
  }ctx.restore();
}
function drawRipples(t,p){
  APP.ripples=APP.ripples.filter(r=>t-r.start<r.duration);ctx.save();for(const r of APP.ripples){const age=(t-r.start)/r.duration;if(age<0)continue;const s=screenFromWorld(r.x,r.z);for(let i=0;i<r.rings;i++){const local=age-i*.09;if(local<0||local>1)continue;const rad=ease(local)*(90+80*s.depth)*r.strength;ctx.strokeStyle=`rgba(190,249,255,${(1-local)*.42*r.strength})`;ctx.lineWidth=1.2*(1-local)+.2;ctx.beginPath();ctx.ellipse(s.x,s.y,rad,rad*.28,0,0,Math.PI*2);ctx.stroke()}}ctx.restore();
}
function drawDrops(t,p){
  APP.drops=APP.drops.filter(d=>t-d.start<d.duration+350);for(const d of APP.drops){const age=(t-d.start)/d.duration;if(age<0||age>1)continue;const target=screenFromWorld(d.x,d.z);const y=lerp(-60,target.y,ease(age));const x=target.x+Math.sin(age*Math.PI)*18*(1-age);const scale=.5+target.scale*.5*age;ctx.save();ctx.translate(x,y);ctx.rotate(age*5);ctx.fillStyle='#071019';ctx.strokeStyle='rgba(210,251,255,.6)';ctx.lineWidth=1;organicEllipse(ctx,13*scale,11*scale,hash(d.id));ctx.fill();ctx.stroke();ctx.restore()}
}
function drawSplashes(t,p){
  APP.splashes=APP.splashes.filter(s=>t-s.start<900);ctx.save();ctx.fillStyle='rgba(205,252,255,.7)';for(const s of APP.splashes){const a=(t-s.start)/900;if(a<0)continue;const x=s.x+s.vx*a*80,y=s.y+s.vy*a*65+80*a*a;ctx.globalAlpha=1-a;ctx.beginPath();ctx.arc(x,y,1.7*(1-a)+.3,0,Math.PI*2);ctx.fill()}ctx.restore()
}
function drawFloaters(t,p){
  APP.floaters=APP.floaters.filter(f=>t-f.start<f.duration);ctx.save();for(const f of APP.floaters){const a=(t-f.start)/f.duration;if(a<0)continue;const s=screenFromWorld(f.x,f.z);ctx.globalAlpha=Math.sin(Math.PI*a)*.22;ctx.strokeStyle='rgba(220,252,255,.7)';ctx.beginPath();ctx.arc(s.x,s.y-28-a*22,2.5+a*4,0,Math.PI*2);ctx.stroke()}ctx.restore()
}

function hitNode(x,y){const nodes=stateAt().nodes.slice().sort((a,b)=>b.z-a.z);for(const n of nodes){const s=screenFromWorld(n.x,n.z),r=(22+Math.min(14,n.layers.length*2))*s.scale;if(Math.hypot(x-s.x,(y-s.y)*1.7)<r*1.25)return n}return null}
function openContextMenu(node,clientX,clientY){
  if(!node)return;APP.contextNode=node.id;APP.selectedNode=node.id;renderUI();const menu=els.contextMenu;menu.classList.add('show');
  const w=220,h=menu.offsetHeight||220;menu.style.left=clamp(clientX,8,innerWidth-w-8)+'px';menu.style.top=clamp(clientY,8,innerHeight-h-8)+'px';
}
function closeContextMenu(){els.contextMenu.classList.remove('show');APP.contextNode=''}
function classifyNode(nodeId,classification){addEvent('classify','',{nodeId,classification});APP.selectedNode=nodeId;renderUI()}
function centerNode(nodeId){const n=stateAt().nodes.find(n=>n.id===nodeId);if(!n)return;const s=screenFromWorld(n.x,n.z);APP.view.panX+=W*.5-s.x;APP.view.panY+=horizon+(H-horizon)*.52-s.y;save()}
function setPresentation(on){
  APP.presentation=on;APP.uiHidden=false;document.body.classList.toggle('presenting',on);document.body.classList.toggle('field-only',on&&APP.settings.presentationView==='field');
  if(on){closeSheet();closeContextMenu()}positionReader();
}
function toggleUI(){if(APP.presentation){setPresentation(false);return}APP.uiHidden=!APP.uiHidden;document.body.classList.toggle('ui-hidden',APP.uiHidden);if(APP.uiHidden)closeSheet()}
function latestNodeEvent(nodeId){return [...APP.events].reverse().find(e=>(e.type==='user'||e.type==='assistant')&&e.nodeId===nodeId)}
function contextAction(action){
  const nodeId=APP.contextNode||APP.selectedNode;if(!nodeId)return;const ev=latestNodeEvent(nodeId);
  if(action==='read'){APP.selectedNode=nodeId;renderUI()}
  else if(action==='speak'&&ev)speak(ev.text,ev.type)
  else if(action==='continue')continueFromNode(nodeId)
  else if(action==='present'){APP.selectedNode=nodeId;setPresentation(true);renderUI()}
  else if(action==='branch'){APP.branchSource=nodeId;renderUI()}
  else if(action==='connect'){if(APP.branchSource&&APP.branchSource!==nodeId){addEvent('branch','',{from:APP.branchSource,to:nodeId,sourceEvent:latestNodeEvent(APP.branchSource)?.id,targetEvent:ev?.id});APP.branchSource='';renderUI()}}
  else if(['neutral','obstacle','goal','shift'].includes(action))classifyNode(nodeId,action)
  else if(action==='center')centerNode(nodeId)
  else if(action==='replay'){const i=APP.events.findLastIndex(e=>e.nodeId===nodeId);if(i>=0)setCursor(i,true)}
  closeContextMenu();
}

/* events */
els.composer.onsubmit=e=>{e.preventDefault();dropMessage(els.message.value)};els.mic.onclick=startRecognition;
$$('.rail-btn').forEach(b=>{b.onclick=()=>b.dataset.action==='present'?setPresentation(true):openSheet(b.dataset.panel)});els.sheetClose.onclick=closeSheet;
els.presentExit.onclick=()=>setPresentation(false);els.readerClose.onclick=()=>{APP.selectedNode='';renderUI()};els.readerSpeak.onclick=()=>{const t=selectedLatestText();if(t)speak(t,'assistant')};
els.contextMenu.addEventListener('click',e=>{const b=e.target.closest('button[data-action]');if(b)contextAction(b.dataset.action)});
els.fileInput.onchange=async e=>{const f=e.target.files[0];if(!f)return;try{const data=JSON.parse(await f.text());if(!Array.isArray(data.events))throw new Error('No event log');APP.autoToken++;APP.events=data.events;APP.settings={...DEFAULT_SETTINGS,...data.settings};APP.view={panX:0,panY:0,zoom:1,...data.view};APP.cursor=APP.liveCursor=APP.events.length-1;APP.replay=false;save();renderUI();closeSheet()}catch(err){APP.fileStatus='Could not import this pond · '+err.message;if(APP.sheet==='file')renderSheet('file');else openSheet('file')}finally{e.target.value=''}};
window.addEventListener('resize',()=>{resize();positionReader()});if('speechSynthesis'in window)speechSynthesis.onvoiceschanged=()=>{if(APP.sheet==='voice')renderSheet('voice')};
window.addEventListener('keydown',e=>{if(e.key==='Escape'){if(els.contextMenu.classList.contains('show'))closeContextMenu();else if(APP.presentation)setPresentation(false);else if(APP.sheet)closeSheet();else if(APP.selectedNode){APP.selectedNode='';renderUI()}}else if(e.key.toLowerCase()==='p'&&!/input|textarea|select/i.test(document.activeElement?.tagName||'')){e.preventDefault();setPresentation(!APP.presentation)}else if(e.key==='Tab'&&!/input|textarea|select|button/i.test(document.activeElement?.tagName||'')){e.preventDefault();toggleUI()}});
window.addEventListener('pointerdown',e=>{if(!e.target.closest('#context-menu')&&!e.target.closest('#pond'))closeContextMenu()});

els.canvas.addEventListener('contextmenu',e=>{e.preventDefault();const r=els.canvas.getBoundingClientRect(),n=hitNode(e.clientX-r.left,e.clientY-r.top);if(n)openContextMenu(n,e.clientX,e.clientY)});
els.canvas.addEventListener('pointerdown',e=>{const r=els.canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;APP.pointer={...APP.pointer,down:true,lastX:x,lastY:y,x,y,moved:false};els.canvas.setPointerCapture(e.pointerId);els.canvas.classList.add('dragging');clearTimeout(APP.longPressTimer);const n=hitNode(x,y);APP.longPressStart={x,y,node:n};if(e.pointerType!=='mouse'&&n)APP.longPressTimer=setTimeout(()=>{APP.pointer.down=false;APP.pointer.moved=true;openContextMenu(n,e.clientX,e.clientY)},560)});
els.canvas.addEventListener('pointermove',e=>{const r=els.canvas.getBoundingClientRect(),x=e.clientX-r.left,y=e.clientY-r.top;APP.pointer.x=x;APP.pointer.y=y;const n=hitNode(x,y);APP.hoverNode=n?.id||'';if(APP.pointer.down){const dx=x-APP.pointer.lastX,dy=y-APP.pointer.lastY;if(Math.abs(dx)+Math.abs(dy)>2){APP.pointer.moved=true;if(APP.longPressStart&&Math.hypot(x-APP.longPressStart.x,y-APP.longPressStart.y)>8)clearTimeout(APP.longPressTimer)}APP.view.panX+=dx;APP.view.panY+=dy*.55;APP.pointer.lastX=x;APP.pointer.lastY=y}});
els.canvas.addEventListener('pointerup',e=>{clearTimeout(APP.longPressTimer);els.canvas.classList.remove('dragging');if(!APP.pointer.moved){const n=hitNode(APP.pointer.x,APP.pointer.y);if(n){APP.selectedNode=n.id;renderUI();if(!APP.replay)APP.cursor=APP.events.length-1}else{APP.selectedNode='';renderUI()}}APP.pointer.down=false;save()});
els.canvas.addEventListener('pointerleave',()=>{clearTimeout(APP.longPressTimer);APP.hoverNode='';APP.pointer.down=false;els.canvas.classList.remove('dragging')});
els.canvas.addEventListener('wheel',e=>{e.preventDefault();closeContextMenu();const before=APP.view.zoom;APP.view.zoom=clamp(APP.view.zoom*Math.exp(-e.deltaY*.001),.68,1.8);const ratio=APP.view.zoom/before;APP.view.panX=(APP.view.panX-(e.offsetX-W*.5))*ratio+(e.offsetX-W*.5);APP.view.panY=(APP.view.panY-(e.offsetY-H*.5))*ratio+(e.offsetY-H*.5);save()},{passive:false});

function escapeHTML(s){return String(s).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]))}
function escapeAttr(s){return escapeHTML(s).replace(/`/g,'&#096;')}
function downloadText(text,name,type){downloadBlob(new Blob([text],{type}),name)}
function downloadBlob(blob,name){const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=name;a.click();setTimeout(()=>URL.revokeObjectURL(a.href),1500)}

load();resize();const latest=[...APP.events].reverse().find(e=>e.nodeId);if(latest)APP.selectedNode=latest.nodeId;
renderUI();requestAnimationFrame(draw);els.message.focus();
})();
</script>
